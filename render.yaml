services:
  - type: web
    name: teamapex-api
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DEFAULT_LOCATION_NAME
        value: Melbourne
      - key: UV_PROVIDER_MODE
        value: hybrid
      - key: UV_REQUEST_TIMEOUT_SECONDS
        value: 15
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://stately-florentine-f56527.netlify.app
      - key: CORS_ORIGIN_REGEX
        value: https://.*\\.(netlify\\.app|onrender\\.com)
  - type: web
    name: teamapex-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://teamapex-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
